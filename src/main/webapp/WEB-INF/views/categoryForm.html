<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 등록</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; }
        input[type="text"] { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; box-sizing: border-box; }
        input.error-field { border-color: #e74c3c; }
        .error-msg { color: #e74c3c; font-size: 0.88em; margin-top: 4px; }
        .btn { padding: 10px 24px; background: #4a90d9; color: white; border: none; border-radius: 4px; font-size: 1em; cursor: pointer; }
        .btn:hover { background: #357abd; }
        .btn-cancel { padding: 10px 24px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px; font-size: 1em; margin-left: 8px; }
        .btn-cancel:hover { background: #545b62; }
    </style>
</head>
<body>

<h1>카테고리 등록</h1>

<form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
    <div class="form-group">
        <label for="name">카테고리 이름 <span style="color:#e74c3c;">*</span></label>
        <input type="text" th:field="*{name}" placeholder="카테고리 이름 입력"
               th:class="${#fields.hasErrors('name')} ? 'error-field' : ''"/>
        <div class="error-msg" th:if="${#fields.hasErrors('name')}">
            <span th:errors="*{name}"></span>
        </div>
    </div>

    <button type="submit" class="btn">등록</button>
    <a th:href="@{/categories}" class="btn-cancel">취소</a>
</form>

<div style="margin-top: 40px; padding: 12px 0; border-top: 1px solid #ccc; font-size: 0.85em; color: #666; text-align: center;">
    실습 수행 일시: <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss')}"></span>
    &nbsp;|&nbsp; 학번: 2371324 &nbsp;|&nbsp; 성명: 박하영
</div>
</body>
</html>
